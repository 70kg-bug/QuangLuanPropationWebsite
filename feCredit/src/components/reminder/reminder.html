<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HCMUT Card</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="card">
        <div class="card-header">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="[w3.org](http://www.w3.org/2000/svg)">
                    <rect x="3" y="5" width="18" height="14" rx="2" stroke="white" stroke-width="2" fill="none"/>
                    <path d="M7 9L12 13L17 9" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <span class="brand-name">HCMUT</span>
        </div>
        
        <div class="card-body">
            <p class="card-text">
                Lorem ipsum dolor sit amet, consectetur adipiscing elit. Nulla pulvinar....
            </p>
            
            <div class="card-footer">
                <div class="tags">
                    <button class="tag">Gym</button>
                    <button class="tag">AWS</button>
                </div>
                
                <button class="arrow-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="[w3.org](http://www.w3.org/2000/svg)">
                        <path d="M9 18L15 12L9 6" stroke="#1a365d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>
</body>
</html>
